<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Digital Safety Knights</title>
<link rel="icon" href="assets/favicon.ico">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0d1b3e, #1a2f6e); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .card { background: white; border-radius: 24px; padding: 3rem 2.5rem; max-width: 460px; width: 100%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .logo { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 1.5rem; }
  .logo img { height: 50px; }
  .logo span { color: #0d1b3e; font-size: 1.1rem; font-weight: 900; }
  h1 { color: #0d1b3e; font-size: 1.8rem; font-weight: 900; margin-bottom: 0.6rem; }
  .gold { color: #c9a84c; }
  p { color: #555; font-size: 0.95rem; line-height: 1.7; margin-bottom: 1.8rem; }
  .form-group { margin-bottom: 1.2rem; text-align: left; }
  .form-group label { display: block; font-size: 0.85rem; font-weight: 800; color: #0d1b3e; margin-bottom: 6px; }
  .form-group input { width: 100%; padding: 13px 16px; border: 2px solid #dde2f0; border-radius: 12px; font-size: 1rem; outline: none; transition: border-color 0.2s; font-family: inherit; }
  .form-group input:focus { border-color: #c9a84c; }
  .btn { width: 100%; padding: 15px; background: #c9a84c; color: #0d1b3e; border: none; border-radius: 28px; font-weight: 900; font-size: 1rem; cursor: pointer; box-shadow: 0 4px 16px rgba(201,168,76,0.3); transition: all 0.2s; font-family: inherit; }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(201,168,76,0.4); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .msg { padding: 1rem; border-radius: 12px; margin-top: 1rem; font-size: 0.9rem; display: none; }
  .msg.success { background: #d4edda; color: #155724; display: block; }
  .msg.error { background: #f8d7da; color: #721c24; display: block; }
  .footer { margin-top: 2rem; font-size: 0.83rem; color: #999; }
  .footer a { color: #c9a84c; text-decoration: none; font-weight: 700; }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <img src="assets/logo.png" alt="DSK">
    <span>Digital Safety Knights</span>
  </div>
  <h1>Welcome Back, <span class="gold">Knight</span></h1>
  <p>Enter your email and we'll send you a secure login link. No password needed.</p>

  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="you@example.com" autofocus>
  </div>
  <button class="btn" id="loginBtn" onclick="sendLink()">🔐 Send Login Link</button>

  <div class="msg" id="msg"></div>

  <div class="footer">
    Not a member yet? <a href="/#membership">Join DSK Free →</a>
  </div>
</div>

<script>
  function sendLink() {
    var email = document.getElementById('email').value.trim();
    if (!email || email.indexOf('@') === -1) {
      showMsg('Please enter a valid email address.', 'error');
      return;
    }

    var btn = document.getElementById('loginBtn');
    btn.textContent = 'Sending...';
    btn.disabled = true;

    fetch('https://w6dqaq0l33.execute-api.us-east-1.amazonaws.com/prod/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email: email})
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) {
        showMsg('✅ Login link sent! Check your email (' + email + ').', 'success');
        document.getElementById('email').value = '';
      } else {
        showMsg('❌ ' + (data.message || 'Could not send link.'), 'error');
      }
    })
    .catch(function(err) {
      showMsg('❌ Connection error. Please try again.', 'error');
      console.error(err);
    })
    .finally(function() {
      btn.textContent = '🔐 Send Login Link';
      btn.disabled = false;
    });
  }

  function showMsg(text, type) {
    var msg = document.getElementById('msg');
    msg.textContent = text;
    msg.className = 'msg ' + type;
  }

  document.getElementById('email').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') sendLink();
  });
</script>

</body>
</html>
